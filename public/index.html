<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Attendance System</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="card hero" style="margin-top: 40px">
        <div>
          <div
            style="
              text-align: center;
              margin-bottom: 24px;
              padding: 16px;
              background: var(--panel);
              border-radius: 8px;
            "
          >
            <div
              style="font-size: 1.5rem; font-weight: 600; color: var(--accent)"
              id="currentDateTime"
            ></div>
            <div
              style="
                font-size: 0.875rem;
                color: var(--text-muted);
                margin-top: 4px;
              "
              id="currentDate"
            ></div>
          </div>
          <h1>QR-Based Attendance System</h1>
          <p class="muted">
            Simple and efficient attendance tracking for meetings and events.
            Scan the QR code to mark your attendance.
          </p>
          <div
            class="actions"
            style="
              margin-top: 16px;
              flex-direction: column;
              align-items: flex-start;
              gap: 16px;
            "
          >
            <div
              class="card"
              style="padding: 16px; width: 100%; background: var(--panel)"
            >
              <h3 style="margin-top: 0">Start Meeting</h3>
              <div class="grid grid-2">
                <div class="field">
                  <label for="meetingTitle">Meeting Title</label>
                  <input id="meetingTitle" placeholder="e.g., Project Sync" />
                </div>
                <div class="field">
                  <label for="meetingVenue">Venue</label>
                  <input
                    id="meetingVenue"
                    placeholder="e.g., Conference Room"
                  />
                </div>
                <div class="field">
                  <label for="meetingTime">Meeting Time</label>
                  <input id="meetingTime" placeholder="e.g., 3:00 PM" />
                </div>
                <div class="field">
                  <label for="adminKeyHome">Admin Password</label>
                  <input
                    id="adminKeyHome"
                    type="password"
                    placeholder="admin@123"
                  />
                </div>
              </div>
              <div class="actions" style="margin-top: 12px">
                <button id="startMeetingBtn" disabled>Start Meeting</button>
                <button
                  id="endMeetingBtn"
                  class="btn-secondary"
                  style="display: none"
                >
                  End Meeting
                </button>
              </div>
              <div
                id="meetingStatus"
                class="status"
                style="display: none"
              ></div>
              <div
                id="activeMeetingInfo"
                style="margin-top: 12px; color: var(--text-muted)"
              ></div>
            </div>
            <div class="actions" style="gap: 12px">
              <a class="btn" href="/attendance">Mark Attendance</a>
              <a class="btn btn-secondary" href="/admin">Admin Dashboard</a>
            </div>
          </div>
        </div>
        <div class="qr-box">
          <img
            id="qrImage"
            alt="Attendance QR"
            style="max-width: 250px; width: 100%"
          />
          <div style="margin-top: 16px; text-align: center">
            <a
              id="downloadQrLink"
              href="/api/qr?download=1"
              download
              class="btn btn-secondary"
              style="font-size: 0.875rem; padding: 8px 16px"
              >Download QR</a
            >
          </div>
          <div
            id="qrStatus"
            class="status"
            style="margin-top: 12px; display: none"
          ></div>
        </div>
      </div>
    </div>

    <script>
      // Real-time date and time display
      const updateDateTime = () => {
        const now = new Date();
        const timeStr = now.toLocaleTimeString("en-US", {
          hour12: true,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
        const dateStr = now.toLocaleDateString("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        });

        const dateTimeEl = document.getElementById("currentDateTime");
        const dateEl = document.getElementById("currentDate");

        if (dateTimeEl) dateTimeEl.textContent = timeStr;
        if (dateEl) dateEl.textContent = dateStr;
      };

      // Update date/time immediately and then every second
      updateDateTime();
      setInterval(updateDateTime, 1000);

      const qrImg = document.getElementById("qrImage");
      const qrStatus = document.getElementById("qrStatus");
      const meetingStatus = document.getElementById("meetingStatus");
      const activeMeetingInfo = document.getElementById("activeMeetingInfo");
      const startBtn = document.getElementById("startMeetingBtn");
      const endBtn = document.getElementById("endMeetingBtn");
      const titleInput = document.getElementById("meetingTitle");
      const venueInput = document.getElementById("meetingVenue");
      const timeInput = document.getElementById("meetingTime");
      const adminKeyInput = document.getElementById("adminKeyHome");
      const downloadQrLink = document.getElementById("downloadQrLink");

      const setStatus = (el, msg, type = "success") => {
        el.textContent = msg;
        el.className = `status ${type === "error" ? "error" : "success"}`;
        el.style.display = "block";
      };

      const clearStatus = (el) => {
        el.style.display = "none";
      };

      const updateButtons = (isActive) => {
        startBtn.style.display = isActive ? "none" : "inline-block";
        endBtn.style.display = isActive ? "inline-block" : "none";
        startBtn.disabled = !(
          !isActive &&
          titleInput.value.trim() &&
          venueInput.value.trim() &&
          timeInput.value.trim()
        );
      };

      [titleInput, venueInput, timeInput].forEach((inp) => {
        inp.addEventListener("input", () => updateButtons(false));
      });

      const loadActiveMeeting = async () => {
        try {
          const res = await fetch("/api/meeting/active");
          const data = await res.json();
          if (!data.active) {
            activeMeetingInfo.textContent = "No active meeting";
            qrImg.src = "";
            downloadQrLink.style.display = "none";
            updateButtons(false);
            return null;
          }
          const m = data.meeting;
          activeMeetingInfo.textContent = `Active: ${m.title} • ${m.venue} • ${m.time} • ${m.date}`;
          const bust = Date.now();
          qrImg.src = `/api/qr?v=${bust}`;
          downloadQrLink.href = `/api/qr?download=1&v=${bust}`;
          downloadQrLink.style.display = "inline-block";
          updateButtons(true);
          return m;
        } catch (err) {
          setStatus(qrStatus, "Could not load meeting/QR", "error");
          return null;
        }
      };

      startBtn.addEventListener("click", async () => {
        clearStatus(meetingStatus);
        const payload = {
          title: titleInput.value.trim(),
          venue: venueInput.value.trim(),
          time: timeInput.value.trim(),
        };
        if (!payload.title || !payload.venue || !payload.time) {
          setStatus(
            meetingStatus,
            "Please fill meeting title, venue and time",
            "error"
          );
          return;
        }
        const adminKey = adminKeyInput.value.trim();
        try {
          const res = await fetch("/api/meeting/start", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-admin-key": adminKey,
            },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok)
            throw new Error(data.message || "Could not start meeting");
          setStatus(meetingStatus, "Meeting started. QR refreshed.", "success");
          await loadActiveMeeting();
        } catch (err) {
          setStatus(meetingStatus, err.message, "error");
        }
      });

      endBtn.addEventListener("click", async () => {
        clearStatus(meetingStatus);
        const adminKey = adminKeyInput.value.trim();
        try {
          const res = await fetch("/api/meeting/end", {
            method: "POST",
            headers: { "x-admin-key": adminKey },
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message || "Could not end meeting");
          setStatus(meetingStatus, "Meeting ended. QR expired.", "success");
          qrImg.src = "";
          downloadQrLink.style.display = "none";
          activeMeetingInfo.textContent = "No active meeting";
          updateButtons(false);
        } catch (err) {
          setStatus(meetingStatus, err.message, "error");
        }
      });

      // Initial load
      loadActiveMeeting();
    </script>
  </body>
</html>
