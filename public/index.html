<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Attendance System</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <div class="card hero" style="margin-top: 40px;">
      <div>
        <div style="text-align: center; margin-bottom: 24px; padding: 16px; background: var(--panel); border-radius: 8px;">
          <div style="font-size: 1.5rem; font-weight: 600; color: var(--accent);" id="currentDateTime"></div>
          <div style="font-size: 0.875rem; color: var(--text-muted); margin-top: 4px;" id="currentDate"></div>
        </div>
        <h1>QR-Based Attendance System</h1>
        <p class="muted">Simple and efficient attendance tracking for meetings and events. Scan the QR code to mark your attendance.</p>
        <div class="actions" style="margin-top: 24px;">
          <a class="btn" href="/attendance">Mark Attendance</a>
          <a class="btn btn-secondary" href="/admin">Admin Dashboard</a>
        </div>
      </div>
      <div class="qr-box">
        <img id="qrImage" alt="Attendance QR" style="max-width: 250px; width: 100%;" />
        <div style="margin-top: 16px; text-align: center;">
          <a href="/api/qr?download=1" download class="btn btn-secondary" style="font-size: 0.875rem; padding: 8px 16px;">Download QR</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Real-time date and time display
    const updateDateTime = () => {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      
      const dateTimeEl = document.getElementById('currentDateTime');
      const dateEl = document.getElementById('currentDate');
      
      if (dateTimeEl) dateTimeEl.textContent = timeStr;
      if (dateEl) dateEl.textContent = dateStr;
    };

    // Update date/time immediately and then every second
    updateDateTime();
    setInterval(updateDateTime, 1000);

    document.getElementById('qrImage').src = '/api/qr';
  </script>
</body>
</html>
